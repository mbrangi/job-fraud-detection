<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>Fake Job Advertisements</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='vendors/iconfonts/font-awesome/css/all.min.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='vendors/css/vendor.bundle.base.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='vendors/css/vendor.bundle.addons.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>

  <body>
    <div class="container-scroller">
      <div class="container-fluid page-body-wrapper full-page-wrapper">
        <div
          class="content-wrapper d-flex align-items-stretch auth auth-img-bg"
        >
          <div class="row flex-grow">
            <div
              class="col-lg-6 d-flex align-items-center justify-content-center"
            >
              <div class="auth-form-transparent text-left p-3">
                <h4 style="padding: 10px">Fake Job Advertisement Detection</h4>
                <h6 class="font-weight-light"></h6>

                {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %} {% for category, message in messages %}
                <div
                  class="alert alert-{{ category }} alert-dismissible fade show"
                  role="alert"
                >
                  {{ message }}
                </div>
                {% endfor %} {% endif %} {% endwith %}

                <form id="loginForm" class="pt-3">
                  <div class="form-group">
                    <label for="emailInput">Email / Username</label>
                    <div class="input-group">
                      <div class="input-group-prepend bg-transparent">
                        <span
                          class="input-group-text bg-transparent border-right-0"
                        >
                          <i class="fa fa-user text-primary"></i>
                        </span>
                      </div>
                      <input
                        type="text"
                        class="form-control form-control-lg border-left-0"
                        id="emailInput"
                        placeholder="Email / Username"
                        name="username"
                        required
                      />
                    </div>
                  </div>
                  <div class="form-group">
                    <label for="passwordInput">Password</label>
                    <div class="input-group">
                      <div class="input-group-prepend bg-transparent">
                        <span
                          class="input-group-text bg-transparent border-right-0"
                        >
                          <i class="fa fa-lock text-primary"></i>
                        </span>
                      </div>
                      <input
                        type="password"
                        class="form-control form-control-lg border-left-0"
                        id="passwordInput"
                        placeholder="Password"
                        name="password"
                        required
                      />
                    </div>
                  </div>
                  <div id="loginError" class="alert alert-danger d-none"></div>
                  <div class="d-flex justify-content-end mb-3">
                    <a href="{{ url_for('reset_password_page') }}" class="auth-link text-black small">Forgot password?</a>
                  </div>
                  <div class="my-3">
                    <button
                      class="btn btn-block btn-primary btn-lg font-weight-medium auth-form-btn"
                      type="submit"
                      id="loginBtn"
                    >
                      LOGIN
                    </button>
                  </div>
                </form>

                <a href="{{ url_for('register') }}"
                  >Don't have an account? Register</a
                >
              </div>
            </div>
            <div class="col-lg-6 login-half-bg d-flex flex-row">
              <p
                class="text-white font-weight-medium text-center flex-grow align-self-end"
              >
                Copyright &copy; 2026 All rights reserved.
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="{{ url_for('static', filename='vendors/js/vendor.bundle.base.js') }}"></script>
    <script src="{{ url_for('static', filename='vendors/js/vendor.bundle.addons.js') }}"></script>
    <script src="{{ url_for('static', filename='js/off-canvas.js') }}"></script>
    <script src="{{ url_for('static', filename='js/hoverable-collapse.js') }}"></script>
    <script src="{{ url_for('static', filename='js/misc.js') }}"></script>
    <script src="{{ url_for('static', filename='js/settings.js') }}"></script>
    <script src="{{ url_for('static', filename='js/todolist.js') }}"></script>
    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>

    <script type="module">
      import { auth, signInWithEmailAndPassword } from "{{ url_for('static', filename='js/firebase-config.js') }}";

      const form = document.getElementById('loginForm');
      const emailInput = document.getElementById('emailInput');
      const passwordInput = document.getElementById('passwordInput');
      const loginBtn = document.getElementById('loginBtn');
      const loginError = document.getElementById('loginError');

      async function resolveEmail(input) {
        if (input.includes('@')) return input;
        const formData = new FormData();
        formData.append('username', input);
        const res = await fetch('{{ url_for("lookup_email") }}', { method: 'POST', body: formData });
        if (!res.ok) throw new Error('Username not found');
        const data = await res.json();
        return data.email;
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        loginBtn.disabled = true;
        loginBtn.textContent = 'Signing in...';
        loginError.classList.add('d-none');

        try {
          const email = await resolveEmail(emailInput.value.trim());
          const userCredential = await signInWithEmailAndPassword(auth, email, passwordInput.value);
          const idToken = await userCredential.user.getIdToken();

          const formData = new FormData();
          formData.append('idToken', idToken);

          const response = await fetch('{{ url_for("login") }}', {
            method: 'POST',
            body: formData
          });

          if (response.redirected) {
            window.location.href = response.url;
          } else {
            const html = await response.text();
            document.open();
            document.write(html);
            document.close();
          }
        } catch (error) {
          loginError.textContent = error.message;
          loginError.classList.remove('d-none');
          loginBtn.disabled = false;
          loginBtn.textContent = 'LOGIN';
        }
      });
    </script>
  </body>
</html>
