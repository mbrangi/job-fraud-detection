<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Fake Job Advertisements - Reset Password</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo.png') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='vendors/iconfonts/font-awesome/css/all.min.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='vendors/css/vendor.bundle.base.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='vendors/css/vendor.bundle.addons.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  </head>
  <body>
    <div class="container-scroller">
      <div class="container-fluid page-body-wrapper full-page-wrapper">
        <div class="content-wrapper d-flex align-items-center auth">
          <div class="row w-100">
            <div class="col-lg-4 mx-auto">
              <div class="auth-form-light text-left p-5">
                <div class="brand-logo"></div>
                <h4>Reset Password</h4>
                <h6 class="font-weight-light">Enter your email and we'll send you a reset link</h6>

                <div id="resetSuccess" class="alert alert-success d-none">
                  Password reset email sent! Check your inbox.
                </div>
                <div id="resetError" class="alert alert-danger d-none"></div>

                <form id="resetForm">
                  <div class="form-group">
                    <input type="email" class="form-control form-control-lg" id="emailInput" placeholder="Your registered email" required />
                  </div>
                  <div class="mt-3">
                    <button type="submit" class="btn btn-block btn-primary btn-lg font-weight-medium auth-form-btn" id="resetBtn">
                      Send Reset Link
                    </button>
                  </div>
                  <div class="text-center mt-4 font-weight-light">
                    <a href="/">Back to Login</a>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="{{ url_for('static', filename='vendors/js/vendor.bundle.base.js') }}"></script>
    <script src="{{ url_for('static', filename='vendors/js/vendor.bundle.addons.js') }}"></script>
    <script src="{{ url_for('static', filename='js/hoverable-collapse.js') }}"></script>
    <script src="{{ url_for('static', filename='js/misc.js') }}"></script>
    <script src="{{ url_for('static', filename='js/todolist.js') }}"></script>

    <script type="module">
      import { auth, sendPasswordResetEmail } from "{{ url_for('static', filename='js/firebase-config.js') }}";

      const form = document.getElementById('resetForm');
      const emailInput = document.getElementById('emailInput');
      const resetBtn = document.getElementById('resetBtn');
      const resetError = document.getElementById('resetError');
      const resetSuccess = document.getElementById('resetSuccess');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        resetBtn.disabled = true;
        resetBtn.textContent = 'Sending...';
        resetError.classList.add('d-none');
        resetSuccess.classList.add('d-none');

        try {
          await sendPasswordResetEmail(auth, emailInput.value);
          resetSuccess.classList.remove('d-none');
          resetBtn.textContent = 'Sent';
        } catch (error) {
          resetError.textContent = error.message;
          resetError.classList.remove('d-none');
          resetBtn.disabled = false;
          resetBtn.textContent = 'Send Reset Link';
        }
      });
    </script>
  </body>
</html>
