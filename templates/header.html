  <div class="navbar-menu-wrapper d-flex align-items-center justify-content-end">

<div class="table-responsive" style="display:none;">
  <table class="table table-striped">
    <thead>
      <tr>
        <th>#</th>
        <th>Title</th>
        <th>Filename</th>
        <th>Status</th>
        <th>Date</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody>
      {% for record in records %}
      <tr>
        <td>{{ loop.index }}</td>

        <td>{{ record.filename }}</td>

        <td>{{ record.filename }}</td>

        <td>
          <span
            class="alert alert-{{ 'danger' if record.result == 'fake' else 'success' if record.result == 'legit' else 'warning' }}"
          >
            {{ record.result.upper() }}
          </span>
        </td>

        <td>{{ record.created_at }}</td>

        <td>
          <a
            href="{{ url_for('delete_file', doc_type=record.type, doc_id=record.id) }}"
            onclick="return confirm('Are you sure you want to delete this file?');"
          >
            <button class="badge badge-danger badge-pill">
              Delete
            </button>
          </a>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
