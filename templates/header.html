<link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo.png') }}">
<!-- partial:partials/_navbar.html -->
<nav class="navbar col-lg-12 col-12 p-0 fixed-top d-flex flex-row">
  <div class="navbar-brand-wrapper d-flex align-items-center justify-content-between">
    <a class="navbar-brand brand-logo" href="/home">
      <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" style="height:40px;">
    </a>
    <a class="navbar-brand brand-logo-mini" href="/home">
      <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" style="height:35px;">
    </a>
  </div>
  <div class="navbar-menu-wrapper d-flex align-items-center justify-content-end">
    <button class="btn btn-sm btn-link text-white mr-2" onclick="toggleDarkMode()" title="Toggle Dark Mode">
      <i id="darkModeIcon" class="fa fa-moon"></i>
    </button>
  </div>
</nav>
<!-- partial -->

<div class="table-responsive" style="display:none;">
  <table class="table table-striped">
    <thead>
      <tr>
        <th>#</th>
        <th>Title</th>
        <th>Filename</th>
        <th>Status</th>
        <th>Date</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody>
      {% for record in records %}
      <tr>
        <td>{{ loop.index }}</td>

        <td>{{ record.filename }}</td>

        <td>{{ record.filename }}</td>

        <td>
          <span
            class="alert alert-{{ 'danger' if record.result == 'fake' else 'success' if record.result == 'legit' else 'warning' }}"
          >
            {{ record.result.upper() }}
          </span>
        </td>

        <td>{{ record.created_at }}</td>

        <td>
          <a
            href="{{ url_for('delete_file', doc_type=record.type, doc_id=record.id) }}"
            onclick="return confirm('Are you sure you want to delete this file?');"
          >
            <button class="badge badge-danger badge-pill">
              Delete
            </button>
          </a>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>

<!-- content-wrapper ends -->

<!-- partial:../../partials/_footer.html -->
<footer class="footer">
  <div
    class="d-sm-flex justify-content-center justify-content-sm-between"
  >
    <span
      class="text-muted text-center text-sm-left d-block d-sm-inline-block"
    >
      Copyright &copy; 2026. All rights reserved.
    </span>

    <span
      class="float-none float-sm-right d-block mt-1 mt-sm-0 text-center"
    >
      Hand-crafted & made with
      <i class="far fa-heart text-danger"></i>
    </span>
  </div>
</footer>

<style>
.navbar-brand-wrapper .navbar-brand img {
  border-radius: 50%;
  height: 38px;
  width: 38px;
  object-fit: cover;
  transition: transform 0.2s;
  box-shadow: 0 0 0 2px rgba(255,255,255,0.15);
}
.navbar-brand-wrapper .navbar-brand img:hover {
  transform: scale(1.08);
}
.navbar-brand-wrapper .navbar-brand.brand-logo-mini img {
  height: 34px;
  width: 34px;
}
.dark-mode, .dark-mode .container-scroller { background: #1a1a2e; color: #e0e0e0; }
.dark-mode .card { background: #16213e; border-color: #0f3460; color: #e0e0e0; }
.dark-mode .card .card-title { color: #e0e0e0; }
.dark-mode .navbar { background: #0f3460 !important; }
.dark-mode .sidebar-left { background: #16213e; }
.dark-mode .sidebar-left .nav-link { color: #a0a0b0; }
.dark-mode .sidebar-left .nav-link:hover { color: #fff; }
.dark-mode .sidebar-left .sub-menu .nav-link { color: #8899aa; }
.dark-mode .main-panel { background: #1a1a2e; }
.dark-mode .content-wrapper { background: #1a1a2e; }
.dark-mode .page-header h3 { color: #e0e0e0; }
.dark-mode .breadcrumb { background: #16213e; }
.dark-mode .breadcrumb-item, .dark-mode .breadcrumb-item a { color: #8899aa; }
.dark-mode .table { color: #e0e0e0; }
.dark-mode .table-striped tbody tr:nth-of-type(odd) { background: rgba(255,255,255,0.03); }
.dark-mode .table thead th { border-color: #0f3460; }
.dark-mode .footer { background: #16213e; color: #8899aa; border-color: #0f3460; }
.dark-mode .form-control { background: #1a1a2e; border-color: #0f3460; color: #e0e0e0; }
.dark-mode .alert { background: transparent; }
.dark-mode .dataTables_wrapper .dataTables_filter input,
.dark-mode .dataTables_wrapper .dataTables_length select { background: #1a1a2e; border-color: #0f3460; color: #e0e0e0; }
.dark-mode .page-title { color: #e0e0e0; }
</style>
<script>
(function() {
  var dark = localStorage.getItem('darkMode') === 'true';
  if (dark) document.body.classList.add('dark-mode');
  if (dark) document.getElementById('darkModeIcon').className = 'fa fa-sun';
})();
function toggleDarkMode() {
  var el = document.body;
  el.classList.toggle('dark-mode');
  var on = el.classList.contains('dark-mode');
  localStorage.setItem('darkMode', on);
  document.getElementById('darkModeIcon').className = on ? 'fa fa-sun' : 'fa fa-moon';
}
</script>
<!-- partial -->
</div>
