<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>Fake Job Advertisements</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo.png') }}" />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='vendors/iconfonts/font-awesome/css/all.min.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='vendors/css/vendor.bundle.base.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='vendors/css/vendor.bundle.addons.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>

  <body>
    <div class="container-scroller">
      <div class="container-fluid page-body-wrapper full-page-wrapper">
        <div class="content-wrapper d-flex align-items-center auth">
          <div class="row w-100">
            <div class="col-lg-4 mx-auto">
              <div class="auth-form-light text-left p-5">
                <div class="brand-logo"></div>
                <h4>Get Registration</h4>
                <h6 class="font-weight-light">
                  Signing up is easy. It only takes a few steps
                </h6>
                {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %} {% for category, message in messages %}
                <div
                  class="alert alert-{{ category }} alert-dismissible fade show"
                  role="alert"
                >
                  {{ message }}
                </div>
                {% endfor %} {% endif %} {% endwith %}

                <form id="registerForm">
                  <div class="form-group">
                    <input
                      type="text"
                      class="form-control form-control-lg"
                      id="fullnameInput"
                      placeholder="Full name"
                      name="fullname"
                      required
                    />
                  </div>

                  <div class="form-group">
                    <input
                      type="text"
                      class="form-control form-control-lg"
                      id="usernameInput"
                      placeholder="Username"
                      name="username"
                      required
                    />
                  </div>

                  <div class="form-group">
                    <input
                      type="email"
                      class="form-control form-control-lg"
                      id="emailInput"
                      placeholder="Email"
                      required
                    />
                  </div>

                  <div class="form-group">
                    <input
                      type="password"
                      class="form-control form-control-lg"
                      id="passwordInput"
                      placeholder="Password"
                      name="password"
                      required
                    />
                  </div>
                  <div id="registerError" class="alert alert-danger d-none"></div>
                  <div class="mb-4"></div>
                  <div class="mt-3">
                    <button
                      type="submit"
                      class="btn btn-block btn-primary btn-lg font-weight-medium auth-form-btn"
                      id="registerBtn"
                    >
                      Register
                    </button>
                  </div>
                  <div class="text-center mt-4 font-weight-light">
                    <a href="/">Already have an account? Login</a>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="{{ url_for('static', filename='vendors/js/vendor.bundle.base.js') }}"></script>
    <script src="{{ url_for('static', filename='vendors/js/vendor.bundle.addons.js') }}"></script>
    <script src="{{ url_for('static', filename='js/off-canvas.js') }}"></script>
    <script src="{{ url_for('static', filename='js/hoverable-collapse.js') }}"></script>
    <script src="{{ url_for('static', filename='js/misc.js') }}"></script>
    <script src="{{ url_for('static', filename='js/settings.js') }}"></script>
    <script src="{{ url_for('static', filename='js/todolist.js') }}"></script>
    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>

    <script type="module">
      import { auth, createUserWithEmailAndPassword } from "{{ url_for('static', filename='js/firebase-config.js') }}";

      const form = document.getElementById('registerForm');
      const fullnameInput = document.getElementById('fullnameInput');
      const usernameInput = document.getElementById('usernameInput');
      const emailInput = document.getElementById('emailInput');
      const passwordInput = document.getElementById('passwordInput');
      const registerBtn = document.getElementById('registerBtn');
      const registerError = document.getElementById('registerError');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        registerBtn.disabled = true;
        registerBtn.textContent = 'Creating account...';
        registerError.classList.add('d-none');

        try {
          const userCredential = await createUserWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
          const idToken = await userCredential.user.getIdToken();

          const formData = new FormData();
          formData.append('idToken', idToken);
          formData.append('fullname', fullnameInput.value);
          formData.append('username', usernameInput.value);

          const response = await fetch('{{ url_for("register") }}', {
            method: 'POST',
            body: formData
          });

          if (response.redirected) {
            window.location.href = response.url;
          } else {
            const html = await response.text();
            document.open();
            document.write(html);
            document.close();
          }
        } catch (error) {
          registerError.textContent = error.message;
          registerError.classList.remove('d-none');
          registerBtn.disabled = false;
          registerBtn.textContent = 'Register';
        }
      });
    </script>
  </body>
</html>
